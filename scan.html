<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attend-X UniMAP | FKTEN & Dewan Ilmu</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --unimap-blue: #1e3a8a; --unimap-gold: #fbbf24; --dark-slate: #0f172a; }
        body { background: var(--dark-slate); color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        
        .header-unimap { 
            background: var(--unimap-blue); 
            padding: 20px; 
            border-bottom: 4px solid var(--unimap-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .system-title { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .card-custom { 
            background: #1e293b; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #reader { 
            width: 100% !important; 
            border-radius: 20px !important; 
            overflow: hidden; 
            border: 3px solid var(--unimap-gold) !important;
            background: #000 !important;
        }

        .status-box { 
            background: rgba(30, 41, 59, 0.8); 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .log-container {
            height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .log-item {
            background: rgba(15, 23, 42, 0.6);
            border-left: 4px solid var(--unimap-gold);
            border-radius: 10px;
            margin-bottom: 10px;
            padding: 12px;
        }

        /* Custom Scrollbar */
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: var(--unimap-gold); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header-unimap text-center mb-4">
        <div class="container">
            <h2 class="system-title fw-bold m-0 text-white">UniMAP ATTEND-X</h2>
            <p class="m-0 text-info small fw-bold text-uppercase">Pauh Putra Campus Security Scanner</p>
        </div>
    </div>

    <div class="container px-4">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card-custom p-4 mb-4">
                    <div class="status-box mb-3 text-center">
                        <small class="text-muted d-block mb-1 text-uppercase fw-bold" style="font-size: 0.7rem;">📍 Lokasi Semasa Dikesan:</small>
                        <h5 id="locText" class="m-0 text-warning fw-bold">Mencari Signal GPS...</h5>
                    </div>

                    <div id="reader"></div>
                    
                    <div class="mt-3 text-center">
                        <span class="badge bg-dark border border-secondary px-3 py-2 rounded-pill">
                            <i class="fas fa-satellite-dish me-2 text-info"></i>GPS Magnitude: <span id="distVal">0</span>m
                        </span>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card-custom p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h6 class="fw-bold m-0"><i class="fas fa-history me-2 text-info"></i>LOG KEHADIRAN TERKINI</h6>
                        <span id="liveTime" class="badge bg-primary px-3 py-2">00:00:00</span>
                    </div>

                    <div id="attendanceLog" class="log-container">
                        <div id="noData" class="text-center py-5 opacity-50">
                            <i class="fas fa-qrcode fa-3x mb-3"></i>
                            <p>Sila scan QR untuk merekodkan kehadiran anda.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
        import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

        // 1. Firebase Configuration (UniMAP Project)
        const firebaseConfig = {
            apiKey: "AIzaSyCcl-Uc1euz9f-suw9zRQpmKm6QwjcTRPE",
            authDomain: "kehadiran-unimap.firebaseapp.com",
            projectId: "kehadiran-unimap",
            storageBucket: "kehadiran-unimap.firebasestorage.app",
            messagingSenderId: "413136518683",
            appId: "1:413136518683:web:f0327f5677016234b3c2be"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 2. Definisi Lokasi (Magnitud Koordinat)
        const LOKASI_SAH = [
            { 
                nama: "Fakulti Teknologi Elektronik (FKTEN)", 
                lat: 6.460451, 
                lng: 100.350125 
            },
            { 
                nama: "Dewan Ilmu UniMAP", 
                lat: 6.456012700234823, 
                lng: 100.19079871839197
            }
        ];

        let currentHall = null;
        const RADIUS_LIMIT_KM = 0.05; // 50 Meter

        // 3. Auto-Detect Location Engine
        function trackLocation() {
            if (!navigator.geolocation) return;

            navigator.geolocation.watchPosition((pos) => {
                const uLat = pos.coords.latitude;
                const uLng = pos.coords.longitude;
                let foundHall = null;
                let shortestDist = 999;

                LOKASI_SAH.forEach(loc => {
                    const d = calculateDistance(uLat, uLng, loc.lat, loc.lng);
                    if (d < RADIUS_LIMIT_KM) {
                        foundHall = loc.nama;
                        shortestDist = d;
                    }
                });

                const displayDist = (shortestDist === 999) ? 0 : (shortestDist * 1000).toFixed(0);
                document.getElementById('distVal').innerText = displayDist;

                if (foundHall) {
                    currentHall = foundHall;
                    const el = document.getElementById('locText');
                    el.innerText = foundHall;
                    el.className = "m-0 text-success animate__animated animate__pulse animate__infinite";
                } else {
                    currentHall = null;
                    document.getElementById('locText').innerText = "DI LUAR KAWASAN KULIAH";
                    document.getElementById('locText').className = "m-0 text-danger";
                }
            }, null, { enableHighAccuracy: true });
        }

        // 4. Formula Magnitud Jarak (Haversine)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Jejari Bumi KM
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 5. Scanner Implementation
        const scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        scanner.render((decodedText) => submitAttendance(decodedText));

        async function submitAttendance(studentID) {
            if (!currentHall) {
                return Swal.fire({
                    title: 'Akses Disekat!',
                    text: 'Anda tidak berada dalam kawasan FKTEN atau Dewan Ilmu.',
                    icon: 'error',
                    background: '#1e293b',
                    color: '#fff'
                });
            }

            const today = new Date().toISOString().split('T')[0];
            const timeStr = new Date().toLocaleTimeString('ms-MY');

            try {
                // Simpan ke Firebase Realtime Database
                await set(ref(db, `kehadiran_unimap/${today}/${studentID}`), {
                    studentID: studentID,
                    lokasi: currentHall,
                    masa: timeStr,
                    timestamp: serverTimestamp()
                });

                Swal.fire({
                    title: 'Berjaya!',
                    text: `ID: ${studentID} direkodkan di ${currentHall}`,
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                });

                updateLogUI(studentID, currentHall, timeStr);

            } catch (error) {
                Swal.fire('Ralat Firebase', error.message, 'error');
            }
        }

        function updateLogUI(id, loc, time) {
            const container = document.getElementById('attendanceLog');
            if (document.getElementById('noData')) document.getElementById('noData').remove();

            const html = `
                <div class="log-item animate__animated animate__fadeInDown">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold text-white">${id}</div>
                            <small class="text-info"><i class="far fa-clock me-1"></i>${time}</small>
                        </div>
                        <span class="badge bg-primary" style="font-size: 0.6rem;">${loc}</span>
                    </div>
                </div>`;
            container.insertAdjacentHTML('afterbegin', html);
        }

        // Clock
        setInterval(() => {
            document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ms-MY');
        }, 1000);

        // Start tracking
        trackLocation();
    </script>
</body>
</html>
