<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attend-X | Daftar Pelajar UniMAP</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --unimap-blue: #1e3a8a; --unimap-gold: #fbbf24; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .reg-card { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .header-reg { background: var(--unimap-blue); color: white; padding: 30px; border-bottom: 5px solid var(--unimap-gold); }
        .btn-primary { background: var(--unimap-blue); border: none; padding: 12px; border-radius: 10px; font-weight: 600; }
        .btn-primary:hover { background: #162d6d; }
        #qrcode { background: white; padding: 20px; border-radius: 15px; display: inline-block; border: 2px dashed #cbd5e1; }
        .qr-result { display: none; }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="reg-card">
                    <div class="header-reg text-center">
                        <h3 class="fw-bold m-0">PENDAFTARAN PELAJAR</h3>
                        <p class="m-0 opacity-75">Sila isi maklumat untuk dapatkan QR Code</p>
                    </div>

                    <div class="p-4 p-md-5">
                        <form id="regForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nama Penuh</label>
                                <input type="text" id="stuName" class="form-control form-control-lg" placeholder="Contoh: AHMAD BIN ALI" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">No. Matrik / ID Pelajar</label>
                                <input type="text" id="stuID" class="form-control form-control-lg" placeholder="Contoh: 221234567" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Fakulti / Kursus</label>
                                <select id="stuClass" class="form-select form-select-lg">
                                    <option value="FKTEN">FKTEN (Elektronik)</option>
                                    <option value="FKP">FKP (Pembuatan)</option>
                                    <option value="FKM">FKM (Mekanikal)</option>
                                    <option value="FPIK">FPIK (Komputer)</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 shadow-sm">
                                <i class="fas fa-user-plus me-2"></i>DAFTAR & JANA QR
                            </button>
                        </form>

                        <div class="qr-result text-center mt-5 animate__animated animate__fadeIn">
                            <hr>
                            <h6 class="fw-bold text-muted mb-3">QR CODE ANDA:</h6>
                            <div id="qrcode"></div>
                            <p class="mt-3 mb-1 fw-bold text-primary" id="displayID"></p>
                            <p class="small text-muted mb-4">Sila tangkap layar (screenshot) QR ini untuk kegunaan kehadiran.</p>
                            <button onclick="window.print()" class="btn btn-outline-dark btn-sm">
                                <i class="fas fa-print me-2"></i>CETAK QR
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcl-Uc1euz9f-suw9zRQpmKm6QwjcTRPE",
            authDomain: "kehadiran-unimap.firebaseapp.com",
            projectId: "kehadiran-unimap",
            databaseURL: "https://kehadiran-unimap-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "kehadiran-unimap.firebasestorage.app",
            messagingSenderId: "413136518683",
            appId: "1:413136518683:web:f0327f5677016234b3c2be"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const form = document.getElementById('regForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('stuName').value;
            const id = document.getElementById('stuID').value;
            const fakulti = document.getElementById('stuClass').value;

            Swal.fire({ title: 'Mendaftar...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                // 1. Simpan ke database pelajar
                await set(ref(db, `pelajar_unimap/${id}`), {
                    name: name.toUpperCase(),
                    studentID: id,
                    class: fakulti,
                    status: "AKTIF"
                });

                // 2. Jana QR Code
                document.getElementById('qrcode').innerHTML = ""; // Clear old QR
                new QRCode(document.getElementById("qrcode"), {
                    text: id,
                    width: 200,
                    height: 200,
                    colorDark : "#1e3a8a",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                // 3. Tunjuk result
                Swal.fire({ icon: 'success', title: 'Berjaya Didaftar!', text: 'QR Code anda telah dijana.', timer: 2000, showConfirmButton: false });
                document.querySelector('.qr-result').style.display = 'block';
                document.getElementById('displayID').innerText = `ID: ${id}`;
                form.reset();

            } catch (error) {
                Swal.fire('Ralat', 'Gagal mendaftar pelajar.', 'error');
            }
        });
    </script>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
