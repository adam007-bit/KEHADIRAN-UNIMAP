<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attend-X | Admin Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --unimap-blue: #1e3a8a; --unimap-gold: #fbbf24; }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
        
        .navbar-custom { background: var(--unimap-blue); border-bottom: 4px solid var(--unimap-gold); color: white; padding: 15px; }
        .stats-card { background: white; border-radius: 15px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        .stats-card:hover { transform: translateY(-5px); }
        
        .table-container { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .table thead { background: #f1f5f9; }
        .badge-loc { background: rgba(30, 58, 138, 0.1); color: var(--unimap-blue); font-weight: 600; padding: 5px 12px; border-radius: 50px; }
    </style>
</head>
<body>

    <nav class="navbar-custom mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="m-0 fw-bold"><i class="fas fa-chart-line me-2"></i>ADMIN DASHBOARD</h4>
            <div id="currentDate" class="small fw-bold">Memuatkan tarikh...</div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stats-card p-4 text-center">
                    <h6 class="text-muted text-uppercase mb-2 small fw-bold">Jumlah Kehadiran Hari Ini</h6>
                    <h2 id="totalCount" class="fw-bold text-primary">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card p-4 text-center">
                    <h6 class="text-muted text-uppercase mb-2 small fw-bold">Lokasi Aktif</h6>
                    <h2 class="fw-bold text-success">FKTEN / Dewan Ilmu</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card p-4 text-center text-primary">
                    <h6 class="text-muted text-uppercase mb-2 small fw-bold">Status Sistem</h6>
                    <h2 class="fw-bold"><i class="fas fa-check-circle me-2"></i>ONLINE</h2>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0 text-uppercase">Senarai Kehadiran Terkini</h5>
                <button onclick="exportToExcel()" class="btn btn-outline-success btn-sm fw-bold">
                    <i class="fas fa-file-excel me-2"></i>EXPORT EXCEL
                </button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th class="py-3">Masa</th>
                            <th class="py-3">ID Pelajar</th>
                            <th class="py-3">Lokasi (Auto-Detected)</th>
                            <th class="py-3 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTable">
                        <tr>
                            <td colspan="4" class="text-center py-5 text-muted">Menunggu data dari Firebase...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

        // Guna config UniMAP bos
        const firebaseConfig = {
            apiKey: "AIzaSyCcl-Uc1euz9f-suw9zRQpmKm6QwjcTRPE",
            authDomain: "kehadiran-unimap.firebaseapp.com",
            projectId: "kehadiran-unimap",
            databaseURL: "https://kehadiran-unimap-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "kehadiran-unimap.firebasestorage.app",
            messagingSenderId: "413136518683",
            appId: "1:413136518683:web:f0327f5677016234b3c2be"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // AMBIL DATA SECARA REAL-TIME
        const attendanceRef = ref(db, `kehadiran_unimap/${today}`);
        
        onValue(attendanceRef, (snapshot) => {
            const tbody = document.getElementById('attendanceTable');
            tbody.innerHTML = '';
            let count = 0;

            if (snapshot.exists()) {
                const data = snapshot.val();
                
                // Susun data (terbaru di atas)
                const sortedKeys = Object.keys(data).reverse();

                sortedKeys.forEach(key => {
                    const record = data[key];
                    count++;
                    
                    const row = `
                        <tr>
                            <td class="fw-bold">${record.masa}</td>
                            <td>${record.studentID}</td>
                            <td><span class="badge-loc">${record.lokasi}</span></td>
                            <td class="text-center"><span class="badge bg-success rounded-pill px-3">HADIR</span></td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
                document.getElementById('totalCount').innerText = count;
            } else {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5">Tiada kehadiran direkodkan untuk hari ini.</td></tr>';
                document.getElementById('totalCount').innerText = '0';
            }
        });
    </script>

    <script>
        // Fungsi mudah untuk simpan sebagai file Excel (CSV)
        function exportToExcel() {
            let table = document.getElementById("attendanceTable");
            let rows = Array.from(table.rows);
            let csvContent = "data:text/csv;charset=utf-8,Masa,ID Pelajar,Lokasi,Status\n";

            rows.forEach(row => {
                let rowData = Array.from(row.cells).map(cell => cell.innerText).join(",");
                csvContent += rowData + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Kehadiran_UniMAP_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
        }
    </script>
</body>
</html>
